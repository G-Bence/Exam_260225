<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./src/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <title>exam-260225</title>
</head>

<body>
  <div class="container mt-4">
    <div class="row text-center">
      <h1 class="mt-4 h1 text-white">Share your thoughts in a new blog!</h1>
    </div>
    <div class="row mt-5">
      <div class="col-sm-6 mx-auto">
        <form id="inputForm">
          <div class="mb-3">
            <label for="titleInput" class="form-label text-white">Title of the blog</label>
            <input type="text" class="form-control" id="titleInput">
          </div>
          <div class="mb-3">
            <label for="contentInput" class="form-label text-white">Content of the blog</label>
            <textarea class="form-control" id="contentInput" rows="4"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-check-label text-white" for="colorInput">Select a color for the blog</label>
            <select class="form-select" id="colorInput">
              <option selected>Open this select menu and select a color</option>
              <option value="#d81919" style="background-color: #d81919 !important; color: #fff !important;">Red</option>
              <option value="#eded11" style="background-color: #eded11 !important; color: #000 !important;">Yellow
              </option>
              <option value="#15ed11" style="background-color: #15ed11 !important; color: #000 !important;">Green
              </option>
              <option value="#11cced" style="background-color: #11cced !important; color: #000 !important;">Light Blue
              </option>
              <option value="#2f19f3" style="background-color: #2f19f3 !important; color: #fff !important;">Blue
              </option>
              <option value="#8d19f3" style="background-color: #8d19f3 !important; color: #fff !important;">Pruple
              </option>
              <option value="#f319dd" style="background-color: #f319dd !important; color: #fff !important;">Pink
              </option>
              <option value="#ffffff" style="background-color: #ffffff !important; color: #000 !important;">White
              </option>
              <option value="#000000" style="background-color: #000000 !important; color: #fff !important;">Black
              </option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary">Submit</button>
        </form>
      </div>
    </div>
    <h1 class="mt-4 h1 text-white text-center">See available posts</h1>
    <main class="row w-50 mt-3 mx-auto" id="articleContainer">

    </main>
  </div>




  <script type="module" src="/src/main.ts"></script>
</body>

</html>
